<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AiDeep — 그래프로 생각을 정리하는 법</title>
  <meta name="description" content="줄글 문서 대신 그래프로. AiDeep에서 그래프를 만들고, 노드를 클릭해 바로 편집하고, 자유롭게 옮겨가며 생각을 정리하는 방법을 소개합니다." />
  <link rel="icon" href="./logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="gnb">
    <img class="gnb-logo" src="./logo.png" alt="AiDeep" />
    <span class="gnb-word">AiDeep</span>
  </header>

  <main>
    <section class="card-section">
      <img class="card-img" src="./img/card-1.png" alt="회의록, 노션 문서, 기획서... 끝까지 읽어본 적 있으세요?" width="1080" height="1350" />
    </section>
    <section class="card-section">
      <img class="card-img" src="./img/card-2.png" alt="아이딥은 글을 '구조'로 보여줘요." width="1080" height="1350" />
    </section>
    <section class="card-section">
      <img class="card-img" src="./img/card-3.png" alt="문서가 한눈에 들어오는 그래프 뷰" width="1080" height="1350" />
    </section>
    <section class="card-section">
      <img class="card-img" src="./img/card-4.png" alt="노드를 클릭하면 바로 텍스트 편집" width="1080" height="1350" />
    </section>
    <section class="card-section">
      <img class="card-img" src="./img/card-5.png" alt="노드도 연결선도, 내 맘대로 움직이는 그래프" width="1080" height="1350" />
    </section>

    <section class="cta-section">
      <p class="cta-eyebrow">AiDeep 기본 사용법</p>
      <h2 class="cta-title">이제, 직접 그래프를<br />만들어 보세요</h2>
      <p class="cta-sub">
        빈 공간을 우클릭해 주제를 만들고, 노드를 클릭해 텍스트를 편집하고,<br class="br-desktop" />
        드래그로 자유롭게 옮기면서 생각을 정리해보세요.
      </p>
      <a class="cta-button" href="https://aideep.ai.kr" target="_blank" rel="noopener">
        AiDeep 시작하기 →
      </a>
      <a class="cta-secondary" href="https://won-life.github.io/Aideep_meet_onboard/" target="_blank" rel="noopener">
        회의 자동 구조화가 궁금하다면 → 회의 온보딩 보기
      </a>
    </section>
  </main>

  <footer class="footer">
    <span>© AiDeep</span>
  </footer>
</body>
</html>
